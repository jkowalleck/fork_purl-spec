name: Grammar ABNF Tests (Java / apg-java)

on:
  push:
    paths:
      - "docs/standard/grammar.md"
      - "tests/**"
      - "tests/grammar/java/apg-java/**"
      - ".github/workflows/grammar-tests-java-apg-java.yml"
    branches:
      - "spec/grammar-ABNF"
      - "tests/grammar-ABNF/**"
  pull_request:
    paths:
      - "docs/standard/grammar.md"
      - "tests/**"
      - "tests/grammar/java/apg-java/**"
      - ".github/workflows/grammar-tests-java-apg-java.yml"
    branches:
      - "spec/grammar-ABNF"
  workflow_dispatch:

permissions: {}

jobs:
  grammar-tests-java-apg-java:
    name: Grammar ABNF Tests (Java / apg-java)
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 11
        uses: actions/setup-java@v4
        with:
          java-version: "11"
          distribution: "temurin"
          cache: "maven"

      - name: Run grammar validation tests
        working-directory: tests/grammar/java/apg-java
        # Allow test failures — some failures document known grammar/test-data
        # discrepancies (draft grammar). The step continues so reports are
        # uploaded even when tests fail.
        run: mvn --batch-mode test || true

      - name: Upload Surefire test reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: surefire-reports
          path: tests/grammar/java/apg-java/target/surefire-reports/
          if-no-files-found: warn
